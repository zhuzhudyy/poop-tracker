<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💩 情侣排便统计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .container {
            flex: 1;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            width: 100%;
        }

        .user-selector {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .user-selector h2 {
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .user-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .user-btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border: 3px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .user-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .user-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .record-section,
        .stats-section,
        .recent-records,
        .calendar-section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .record-section h2,
        .stats-section h2,
        .recent-records h2,
        .calendar-section h2 {
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .date-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .date-picker label {
            font-size: 1.1rem;
            color: #555;
            font-weight: 500;
        }

        .date-picker input {
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .date-picker input:focus {
            border-color: #667eea;
        }

        .status-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .status-btn {
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            border: 3px solid #ddd;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .status-btn.yes {
            border-color: #4caf50;
            color: #4caf50;
        }

        .status-btn.yes:hover,
        .status-btn.yes.active {
            background: #4caf50;
            color: white;
            transform: scale(1.05);
        }

        .status-btn.no {
            border-color: #ff9800;
            color: #ff9800;
        }

        .status-btn.no:hover,
        .status-btn.no.active {
            background: #ff9800;
            color: white;
            transform: scale(1.05);
        }

        .current-status {
            text-align: center;
            margin-top: 1rem;
        }

        .status-text {
            font-size: 1.2rem;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 500;
        }

        .status-text.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-text.warning {
            background: #fff3e0;
            color: #ef6c00;
        }

        .status-text.info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-card.success {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .stat-card.warning {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
        }

        .stat-card.info {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 1rem;
            color: #666;
            font-weight: 500;
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .record-item:hover {
            background: #e9ecef;
        }

        .record-date {
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
        }

        .record-status {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
        }

        .record-status.success {
            background: #d4edda;
            color: #155724;
        }

        .record-status.warning {
            background: #fff3cd;
            color: #856404;
        }

        .no-records {
            text-align: center;
            color: #999;
            font-size: 1.1rem;
            padding: 2rem;
        }

        .welcome-message {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .welcome-message p {
            font-size: 1.5rem;
            color: #666;
        }

        .footer {
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5rem;
            text-align: center;
            margin-top: auto;
        }

        .footer p {
            color: #666;
            font-size: 1rem;
        }

        /* 日历样式 */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .calendar-nav button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .calendar-nav button:hover {
            background: #5a6fd6;
        }

        .calendar-month {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 1rem;
        }

        .calendar-header {
            text-align: center;
            padding: 0.75rem 0.5rem;
            font-weight: bold;
            color: #666;
            font-size: 0.9rem;
            background: #f0f0f0;
            border-radius: 6px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 60px;
            background: #f8f9fa;
            position: relative;
        }

        .calendar-day:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .calendar-day.empty {
            background: transparent;
            cursor: default;
        }

        .calendar-day.empty:hover {
            transform: none;
            box-shadow: none;
        }

        .calendar-day-number {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 2px;
        }

        .calendar-day-status {
            display: flex;
            gap: 2px;
            font-size: 0.7rem;
        }

        .calendar-day-status .user-status {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .calendar-day-status .user-status.yes {
            background: #4caf50;
            color: white;
        }

        .calendar-day-status .user-status.no {
            background: #ff9800;
            color: white;
        }

        .calendar-day-status .user-status.empty {
            background: #e0e0e0;
            color: #999;
        }

        .calendar-day.today {
            border: 2px solid #667eea;
        }

        .calendar-day.today .calendar-day-number {
            color: #667eea;
            font-weight: bold;
        }

        .calendar-legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #666;
        }

        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .legend-dot.yes {
            background: #4caf50;
        }

        .legend-dot.no {
            background: #ff9800;
        }

        .legend-dot.empty {
            background: #e0e0e0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .user-buttons {
                flex-direction: column;
            }

            .user-btn {
                width: 100%;
            }

            .status-buttons {
                flex-direction: column;
            }

            .status-btn {
                width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .calendar-grid {
                gap: 2px;
            }

            .calendar-day {
                min-height: 45px;
                padding: 2px;
            }

            .calendar-day-number {
                font-size: 0.75rem;
            }

            .calendar-day-status .user-status {
                width: 14px;
                height: 14px;
                font-size: 8px;
            }

            .calendar-header {
                padding: 0.5rem 0.25rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>💩 情侣排便统计 💩</h1>
            <p class="subtitle">记录每一天的健康习惯 - 蒋老大 & 小邓邓</p>
        </header>

        <div class="container">
            <div class="user-selector">
                <h2>选择用户</h2>
                <div class="user-buttons">
                    <button class="user-btn" data-user="蒋老大">👨 蒋老大</button>
                    <button class="user-btn" data-user="小邓邓">👩 小邓邓</button>
                </div>
            </div>

            <div id="content-area">
                <div class="welcome-message">
                    <p>👆 请选择用户开始记录</p>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>💕 祝你们身体健康，天天通畅 💕</p>
        </footer>
    </div>

    <script>
        let currentUser = '';
        let selectedDate = new Date().toISOString().split('T')[0];
        let records = {};
        let currentCalendarDate = new Date();

        const users = ['蒋老大', '小邓邓'];

        // 从 localStorage 加载数据
        function loadRecords() {
            const savedRecords = localStorage.getItem('poopRecords');
            if (savedRecords) {
                records = JSON.parse(savedRecords);
            }
        }

        // 保存数据到 localStorage
        function saveRecord(user, date, status) {
            if (!records[user]) {
                records[user] = {};
            }
            records[user][date] = status;
            localStorage.setItem('poopRecords', JSON.stringify(records));
            renderContent();
        }

        // 获取某用户某天的记录
        function getRecord(user, date) {
            return records[user]?.[date] || null;
        }

        // 获取统计数据
        function getStats(user) {
            if (!records[user]) return { total: 0, yes: 0, no: 0, rate: 0 };
            
            const dates = Object.keys(records[user]);
            const total = dates.length;
            const yes = dates.filter(date => records[user][date] === true).length;
            const no = dates.filter(date => records[user][date] === false).length;
            const rate = total > 0 ? Math.round((yes / total) * 100) : 0;
            
            return { total, yes, no, rate };
        }

        // 生成日历 HTML
        function generateCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDay = firstDay.getDay();
            
            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                               '七月', '八月', '九月', '十月', '十一月', '十二月'];
            
            let html = `
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)">◀ 上月</button>
                    <span class="calendar-month">${year}年 ${monthNames[month]}</span>
                    <button onclick="changeMonth(1)">下月 ▶</button>
                </div>
                <div class="calendar-grid">
                    <div class="calendar-header">日</div>
                    <div class="calendar-header">一</div>
                    <div class="calendar-header">二</div>
                    <div class="calendar-header">三</div>
                    <div class="calendar-header">四</div>
                    <div class="calendar-header">五</div>
                    <div class="calendar-header">六</div>
            `;
            
            // 空白日期
            for (let i = 0; i < startingDay; i++) {
                html += '<div class="calendar-day empty"></div>';
            }
            
            // 日期
            const today = new Date().toISOString().split('T')[0];
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === today;
                
                // 获取两位用户的记录
                const jiangStatus = getRecord('蒋老大', dateStr);
                const dengStatus = getRecord('小邓邓', dateStr);
                
                let jiangClass = 'empty';
                let jiangIcon = '?';
                if (jiangStatus === true) {
                    jiangClass = 'yes';
                    jiangIcon = '✓';
                } else if (jiangStatus === false) {
                    jiangClass = 'no';
                    jiangIcon = '✗';
                }
                
                let dengClass = 'empty';
                let dengIcon = '?';
                if (dengStatus === true) {
                    dengClass = 'yes';
                    dengIcon = '✓';
                } else if (dengStatus === false) {
                    dengClass = 'no';
                    dengIcon = '✗';
                }
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''}" onclick="selectDate('${dateStr}')">
                        <span class="calendar-day-number">${day}</span>
                        <div class="calendar-day-status">
                            <span class="user-status ${jiangClass}" title="蒋老大">${jiangIcon}</span>
                            <span class="user-status ${dengClass}" title="小邓邓">${dengIcon}</span>
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            
            // 图例
            html += `
                <div class="calendar-legend">
                    <div class="legend-item">
                        <span class="legend-dot yes"></span>
                        <span>拉了</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot no"></span>
                        <span>没拉</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot empty"></span>
                        <span>未记录</span>
                    </div>
                    <div class="legend-item">
                        <span style="font-size: 0.8rem;">👨 蒋老大 👩 小邓邓</span>
                    </div>
                </div>
            `;
            
            return html;
        }

        // 切换月份
        function changeMonth(delta) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + delta);
            renderContent();
        }

        // 选择日期
        function selectDate(date) {
            selectedDate = date;
            renderContent();
            // 滚动到记录区域
            document.querySelector('.record-section').scrollIntoView({ behavior: 'smooth' });
        }

        // 渲染内容区域
        function renderContent() {
            const contentArea = document.getElementById('content-area');
            
            if (!currentUser) {
                contentArea.innerHTML = `
                    <div class="welcome-message">
                        <p>👆 请选择用户开始记录</p>
                    </div>
                `;
                return;
            }

            const stats = getStats(currentUser);
            const currentRecord = getRecord(currentUser, selectedDate);
            
            let statusHtml = '';
            if (currentRecord === true) {
                statusHtml = '<p class="status-text success">🎉 ' + selectedDate + ' 已记录：拉了</p>';
            } else if (currentRecord === false) {
                statusHtml = '<p class="status-text warning">⚠️ ' + selectedDate + ' 已记录：没拉</p>';
            } else {
                statusHtml = '<p class="status-text info">📝 ' + selectedDate + ' 还未记录</p>';
            }

            // 生成最近记录列表
            const userRecords = records[currentUser] || {};
            const sortedDates = Object.keys(userRecords).sort((a, b) => new Date(b) - new Date(a)).slice(0, 7);
            
            let recordsHtml = '';
            if (sortedDates.length === 0) {
                recordsHtml = '<p class="no-records">暂无记录，开始记录吧！</p>';
            } else {
                recordsHtml = sortedDates.map(date => {
                    const status = userRecords[date];
                    const statusClass = status ? 'success' : 'warning';
                    const statusText = status ? '✅ 拉了' : '❌ 没拉';
                    return `
                        <div class="record-item">
                            <span class="record-date">${date}</span>
                            <span class="record-status ${statusClass}">${statusText}</span>
                        </div>
                    `;
                }).join('');
            }

            contentArea.innerHTML = `
                <div class="record-section">
                    <h2>记录今日状态</h2>
                    <div class="date-picker">
                        <label>选择日期：</label>
                        <input type="date" id="date-input" value="${selectedDate}">
                    </div>

                    <div class="status-buttons">
                        <button id="btn-yes" class="status-btn yes" onclick="handleStatus(true)">
                            ✅ 拉了
                        </button>
                        <button id="btn-no" class="status-btn no" onclick="handleStatus(false)">
                            ❌ 没拉
                        </button>
                    </div>

                    <div class="current-status">
                        ${statusHtml}
                    </div>
                </div>

                <div class="calendar-section">
                    <h2>📅 日历统计表</h2>
                    ${generateCalendar()}
                </div>

                <div class="stats-section">
                    <h2>📊 统计数据</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${stats.total}</div>
                            <div class="stat-label">总记录天数</div>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-value">${stats.yes}</div>
                            <div class="stat-label">拉了天数</div>
                        </div>
                        <div class="stat-card warning">
                            <div class="stat-value">${stats.no}</div>
                            <div class="stat-label">没拉天数</div>
                        </div>
                        <div class="stat-card info">
                            <div class="stat-value">${stats.rate}%</div>
                            <div class="stat-label">排便率</div>
                        </div>
                    </div>
                </div>

                <div class="recent-records">
                    <h2>📋 最近记录</h2>
                    <div class="records-list">
                        ${recordsHtml}
                    </div>
                </div>
            `;

            // 添加日期选择器事件监听
            document.getElementById('date-input').addEventListener('change', function(e) {
                selectedDate = e.target.value;
                renderContent();
            });
            
            // 设置按钮状态 - 使用闭包中的 currentRecord
            const btnYes = document.getElementById('btn-yes');
            const btnNo = document.getElementById('btn-no');
            if (btnYes && btnNo) {
                btnYes.classList.remove('active');
                btnNo.classList.remove('active');
                if (currentRecord === true) {
                    btnYes.classList.add('active');
                } else if (currentRecord === false) {
                    btnNo.classList.add('active');
                }
            }
        }

        // 处理状态按钮点击
        function handleStatus(status) {
            saveRecord(currentUser, selectedDate, status);
        }

        // 初始化
        loadRecords();

        // 用户选择按钮事件
        document.querySelectorAll('.user-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentUser = this.dataset.user;
                renderContent();
            });
        });
    </script>
</body>
</html>
